<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Torneio de Sinuca</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Torneio de Sinuca</h1>
      <p>Placar, classificação e calendário dos jogos</p>
    </div>
    <nav>
      <a href="index.html">Início</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <div class="section-title">
        <div>
          <h2>Filtros</h2>
          <p>Filtre a lista de partidas por data, local ou competidor.</p>
        </div>
      </div>
      <div class="filters grid-4">
        <label>Data
          <select id="filter-date"><option value="">Todas</option></select>
        </label>
        <label>Local
          <select id="filter-place"><option value="">Todos</option></select>
        </label>
        <label>Competidor
          <select id="filter-player"><option value="">Todos</option></select>
        </label>
        <label>Divisão
          <select id="filter-division"><option value="">Todas</option></select>
        </label>
      </div>
      <button class="secondary" id="clear-filters">Limpar filtros</button>
    </section>

    <section id="standings"></section>

    <section class="card">
      <div class="section-title">
        <div>
          <h2>Jogos</h2>
          <p>Separados por data e local.</p>
        </div>
      </div>
      <div id="matches"></div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/public.js"></script>
</body>
</html>
