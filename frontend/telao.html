<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Telão - 2° Campeonato de sinuca de entre folhas</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="telao-page">
  <header class="telao-header">
    <div class="telao-brand-wrap">
      <img src="/img/entre-folhas-logo-transparent.png" alt="Logo Entre Folhas Campeonato de Sinuca" class="telao-brand-logo">
      <div>
        <div class="telao-kicker">Exibição em telão</div>
        <h1>2° Campeonato de sinuca de entre folhas</h1>
      </div>
    </div>
    <div class="telao-meta">
      <div class="telao-tool-group">
        <button id="telao-zoom-out" class="telao-icon-button" type="button" title="Diminuir zoom" aria-label="Diminuir zoom">−</button>
        <button id="telao-zoom-in" class="telao-icon-button" type="button" title="Aumentar zoom" aria-label="Aumentar zoom">+</button>
        <div class="telao-radio-picker">
          <button id="telao-radio-menu-button" class="telao-icon-button" type="button" title="Selecionar rádio" aria-label="Selecionar rádio" aria-expanded="false">♫</button>
          <div id="telao-radio-menu" class="telao-radio-menu hidden" role="menu"></div>
        </div>
        <button id="telao-radio-toggle" class="telao-icon-button" type="button" title="Ligar rádio" aria-label="Ligar rádio">🔇</button>
      </div>
      <a href="/index.html" class="secondary button">Voltar ao placar</a>
      <span id="telao-countdown">Carregando...</span>
    </div>
  </header>
  <main id="telao-grid" class="telao-grid"></main>
  <audio id="telao-radio-audio" preload="none"></audio>
  <script src="/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/telao.js"></script>
</body>
</html>
